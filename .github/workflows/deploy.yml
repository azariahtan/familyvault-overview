name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - run: |
          CSS=$(ls dist/client/assets/*.css | head -1 | xargs basename)
          JS=$(ls dist/client/assets/index-*.js | head -1 | xargs basename)
          cat > dist/client/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>FamilyVault</title>
          <link rel="stylesheet" href="/familyvault-overview/assets/$CSS">
          </head>
          <body>
          <div id="app"></div>
          <script type="module" src="/familyvault-overview/assets/$JS"></script>
          </body>
          </html>
          HTMLEOF
          cp dist/client/index.html dist/client/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client
      - uses: actions/deploy-pages@v4
