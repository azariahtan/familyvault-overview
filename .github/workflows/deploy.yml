name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bun run build

      - - name: Prepare for GitHub Pages
        run: |
          # Find the built CSS filename
          CSS_FILE=$(ls dist/client/assets/*.css | head -1 | xargs basename)
          echo "Found CSS: $CSS_FILE"
          
          # Inject CSS link tag into shell HTML
          sed -i "s|</head>|<link rel=\"stylesheet\" href=\"/familyvault-overview/assets/$CSS_FILE\"></head>|" dist/client/_shell.html
          
          cp dist/client/_shell.html dist/client/index.html
          cp dist/client/_shell.html dist/client/404.html
          
          echo "=== Checking index.html has CSS link ==="
          grep "stylesheet" dist/client/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

      - uses: actions/deploy-pages@v4
