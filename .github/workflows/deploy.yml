name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bun run build

      - name: Find and copy index.html
        run: |
          echo "=== dist structure ==="
          find dist -name "index.html" 2>/dev/null || echo "no index.html found"
          ls -la dist/ 2>/dev/null || echo "no dist folder"
          ls -la dist/client/ 2>/dev/null || echo "no dist/client folder"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

      - uses: actions/deploy-pages@v4
